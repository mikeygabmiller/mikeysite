<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .card{padding:54px 60px 54px 64px;display:flex;flex-direction:column;}
  .bar{position:absolute;left:40px;top:54px;bottom:50px;width:8px;border-radius:5px;background:var(--red);}
  .car{position:absolute;right:48px;top:46px;}
  .brand{font-weight:900;font-size:96px;line-height:.86;letter-spacing:-4px;}
  .sub{font-family:'Outfit';font-weight:700;font-size:29px;letter-spacing:12px;color:var(--red);text-transform:uppercase;margin-top:10px;}
  .tagline{font-family:'Caveat';font-weight:700;font-size:46px;color:var(--ink);margin-top:6px;line-height:1;}
  .trust{display:flex;align-items:center;gap:12px;font-family:'Outfit';font-weight:600;font-size:23px;letter-spacing:2px;text-transform:uppercase;margin-top:18px;}
  .trust .stars{font-size:25px;}
  .divider{margin:18px 0 20px;height:0;border-top:3px solid var(--gold);width:100%;position:relative;}
  .divider::after{content:"";position:absolute;left:0;top:-3px;width:210px;border-top:3px solid var(--red);}
  .contact{display:grid;grid-template-columns:1fr 1fr;gap:14px 34px;}
  .tags{font-size:21px;margin-top:auto;padding-top:22px;}
</style></head>
<body>
  <div class="card">
    <div class="bar"></div>
    <svg class="car" width="250" viewBox="0 0 240 116">

</body></html>

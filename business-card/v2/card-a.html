<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .card{padding:48px 56px;display:flex;flex-direction:column;align-items:center;text-align:center;}
  .car{margin-top:4px;}
  .brand{font-weight:900;font-size:88px;line-height:.9;letter-spacing:-3px;margin-top:14px;}
  .sub{font-family:'Outfit';font-weight:700;font-size:28px;letter-spacing:13px;color:var(--red);text-transform:uppercase;margin-top:8px;}
  .divider{width:62%;margin:20px 0 16px;height:0;border-top:3px solid var(--gold);position:relative;}
  .divider::after{content:"";position:absolute;left:50%;transform:translateX(-50%);top:-3px;width:120px;border-top:3px solid var(--red);}
  .trust{display:flex;align-items:center;gap:12px;font-family:'Outfit';font-weight:600;font-size:24px;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;}
  .trust .stars{font-size:26px;}
  .phone{margin-bottom:12px;}
  .meta{display:flex;align-items:center;gap:22px;}
  .tags{font-size:21px;margin-top:auto;}
</style></head>

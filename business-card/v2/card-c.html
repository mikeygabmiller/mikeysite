<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .card{padding:60px 64px;display:flex;flex-direction:column;}
  .top{display:flex;justify-content:space-between;align-items:flex-start;}
  .brand{font-weight:900;font-size:104px;line-height:.82;letter-spacing:-4px;}
  .sub{font-family:'Outfit';font-weight:600;font-size:27px;letter-spacing:14px;color:var(--red);text-transform:uppercase;margin-top:14px;}
  .mark{margin-top:6px;}
  .trust{display:flex;align-items:center;gap:10px;font-family:'Outfit';font-weight:600;font-size:21px;letter-spacing:2px;text-transform:uppercase;margin-top:26px;color:var(--ink);}
  .trust .stars{font-size:23px;}
  .spacer{flex:1;}
  .rule{height:0;border-top:2px solid var(--gold);position:relative;margin-bottom:24px;}
  .rule::after{content:"";position:absolute;left:0;top:-2px;width:170px;border-top:2px solid var(--red);}
  .footer{display:flex;align-items:center;justify-content:space-between;}
  .phone{font-family:'Outfit';font-weight:800;font-size:40px;letter-spacing:0;}
  .right{text-align:right;}
  .right .l{font-family:'Outfit';font-weight:600;font-size:25px;line-height:1.4;}
  .tags{font-size:19px;margin-top:18px;text-align:center;font-weight:600;letter-spacing:5px;}
</style></head>
<body>
  <div class="card">
    <div class="top">
      <div>
        <div class="brand">MIKEY'S</div>
        <div class="sub">Mobile&nbsp;Detailing</div>
      </div>
      <svg class="mark" width="150" viewBox="0 0 240 116">
        <path d="M150,6 l4,11 11,4 -11,4 -4,11 -4,-11 -11,-4 11,-4 z" fill="#C8102E"/>
        <path d="M190,24 l3,8 8,3 -8,3 -3,8 -3,-8 -8,-3 8,-3 z" fill="#C9A24B"/>
        <path d="M16,86 C14,70 20,62 36,60 L72,58 C80,44 98,35 124,35 L150,35 C176,35 190,48 202,60 L218,64 C228,66 232,74 230,86 L202,86 A24,24 0 0 1 154,86 L90,86 A24,24 0 0 1 42,86 Z" fill="#0a0a0a"/>
        <path d="M84,57 C90,47 103,41 122,41 L138,41 L138,57 Z" fill="#C8102E"/>
        <path d="M144,41 L150,41 C170,41 181,50 190,58 L144,58 Z" fill="#C8102E"/>
        <circle cx="66" cy="86" r="19" fill="#0a0a0a"/><circle cx="178" cy="86" r="19" fill="#0a0a0a"/>
        <circle cx="66" cy="86" r="7" fill="#C9A24B"/><circle cx="178" cy="86" r="7" fill="#C9A24B"/>
      </svg>
    </div>

    <div class="trust"><span class="stars">★★★★★</span> 5.0 · 39+ Reviews</div>

    <div class="spacer"></div>

    <div class="rule"></div>
    <div class="footer">
      <div class="phone">(425) 600-7897</div>
      <div class="right">
        <div class="l">mikeysdetailing.com</div>
        <div class="l">Snohomish County, WA</div>
      </div>
    </div>
    <div class="tags">Interior&nbsp;&nbsp;·&nbsp;&nbsp;Exterior&nbsp;&nbsp;·&nbsp;&nbsp;<b>Full&nbsp;Detail</b></div>
  </div>
</body></html>

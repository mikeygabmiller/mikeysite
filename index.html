/* =========================================================
   DESIGN TOKENS
   ========================================================= */
:root {
  --brand-red: #FF0000;

  --brand-gold: #d97706;

  --text-white: #fff;
  --text-gray: #999;
  --text-muted: #666;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 80px; }
body {
  background: var(--bg-card);
  color: var(--text-white);
  font-family: 'Outfit', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
img { max-width: 100%; height: auto; display: block; }
a { color: inherit; }
main { padding-top: 70px; }

.section-inner { max-width: 1200px; margin: 0 auto; padding: 0 40px; width: 100%; }
section { padding: 100px 0; width: 100%; }
section:nth-of-type(odd) { background: #141414; }
section:nth-of-type(even) { background: #1a1a1a; }

/* Skip nav for accessibility */
.skip-nav {
  position: absolute;
  top: -100px;
  left: 16px;
  background: var(--brand-red);
  color: #fff;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 700;
  border-radius: 4px;
  z-index: 99999;
  transition: top 0.2s;
}
.skip-nav:focus { top: 8px; }

@media (max-width: 768px) {
  .section-inner { padding: 0 20px; }
  section { padding: 60px 0; }
}

/* =========================================================
   HEADER / NAV
   ========================================================= */
#mikeyHeader {
  position: fixed; top: 0; left: 0; right: 0; width: 100%;
  background: rgba(0,0,0,0.97);
  z-index: 9999;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
#mikeyHeader nav {
  max-width: 1200px; margin: auto;
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 40px; color: white;
}
#mikeyHeader img { height: 50px; width: auto; display: block; cursor: pointer; }
#desktopMenu { list-style: none; display: flex; gap: 30px; align-items: center; }
#desktopMenu a {
  color: white; text-decoration: none; font-weight: 500; font-size: 0.95rem;
  transition: all 0.2s ease;
  position: relative; padding-bottom: 2px;
}
#desktopMenu a::after {
  content: ''; position: absolute; bottom: 0; left: 0;
  width: 0; height: 2px; background: var(--brand-red);
  transition: width 0.2s ease;
}
#desktopMenu a:hover { color: var(--brand-red); }
#desktopMenu a:hover::after { width: 100%; }
#desktopMenu a:focus-visible { outline: 2px solid var(--brand-red); outline-offset: 4px; border-radius: 2px; }

/* Hamburger */
#hamburgerBtn {
  display: none; flex-direction: column; gap: 5px;
  cursor: pointer; z-index: 10001;
  background: none; border: none; padding: 4px;
}
#hamburgerBtn span {
  width: 24px; height: 3px; background: white;
  border-radius: 2px; transition: all 0.3s ease; display: block;
}
#hamburgerBtn.active span:nth-child(1) { transform: rotate(45deg) translateY(8px); }
#hamburgerBtn.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
#hamburgerBtn.active span:nth-child(3) { transform: rotate(-45deg) translateY(-8px); }

/* Mobile menu */
#mobileMenu {
  list-style: none; position: absolute; top: 100%; left: 0;
  width: 100%; background: rgba(0,0,0,0.99);
  max-height: 0; opacity: 0; overflow: hidden;
  transition: max-height 0.35s ease, opacity 0.25s ease;
}
#mobileMenu.open { max-height: 600px; opacity: 1; }

#mobileMenu li:last-child { border-bottom: none; }

  transition: background 0.15s, padding-left 0.15s;
}
#mobileMenu a:hover { background: rgba(220,38,38,0.15); padding-left: 30px; }
#mobileMenu a:focus-visible { outline: 2px solid var(--brand-red); outline-offset: -2px; }

@media (max-width: 768px) {
  #desktopMenu { display: none !important; }
  #hamburgerBtn { display: flex !important; }

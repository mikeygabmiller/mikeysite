<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 960" width="1120" height="960" font-family="'Bahnschrift','DIN Alternate','Arial Narrow',system-ui,sans-serif">
  <defs>
    <linearGradient id="art" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b1e23"/><stop offset="1" stop-color="#15181c"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#2a2e35" stroke-width="1"/></pattern>
    <style>
      .lbl{font-family:'SF Mono','Cascadia Code','Roboto Mono',ui-monospace,monospace;fill:#aab1bb;font-size:13.5px;letter-spacing:.06em;}
      .lbl.s{font-size:11px;fill:#7c828d;}
      .dim{stroke:#5a626d;stroke-width:1;} .dimt{fill:#8b93a0;font-family:'SF Mono',monospace;font-size:11.5px;}
      .redv{fill:#dc2626;stroke:#fff;stroke-width:1;} .redp{fill:#dc2626;}
      .white{fill:#f5f6f7;stroke:#cfd3d8;stroke-width:.6;}
      .stencil{font-family:Impact,'Arial Narrow Bold',sans-serif;letter-spacing:1px;}
      .head{font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
      .box{fill:#101216;stroke:#2a2e35;stroke-dasharray:4 4;}
      .cont{fill:#20242b;stroke:#39404a;stroke-width:1;}
      .reg{stroke:#5a626d;stroke-width:1.5;}
    </style>
  </defs>

  <rect width="1120" height="960" fill="url(#art)"/>
  <rect width="1120" height="960" fill="url(#grid)" opacity="0.5"/>
  <rect x="16" y="16" width="1088" height="928" fill="none" stroke="#3a3f47" stroke-width="1.5"/>
  <!-- registration crosses -->
  <g class="reg"><path d="M40 60h20M50 50v20"/><path d="M1080 60h-20M1070 50v20"/><path d="M40 900h20M50 890v20"/><path d="M1080 900h-20M1070 890v20"/></g>

  <!-- TITLE -->
  <g>
    <rect x="16" y="16" width="1088" height="82" fill="#20242b" stroke="#3a3f47" stroke-width="1.5"/>
    <rect x="16" y="16" width="8" height="82" fill="#dc2626"/>
    <text x="44" y="50" class="head" fill="#f0f2f4" font-size="27">SATURN SL · RACE LIVERY</text>
    <text x="44" y="76" class="lbl" fill="#9aa2ad" font-size="14">SMALL DECALS · CRICUT SHEET — up to 11.5&quot; wide</text>
    <text x="1080" y="44" class="lbl" text-anchor="end">SHEET 2 / 2 · REV A</text>
    <text x="1080" y="64" class="lbl s" text-anchor="end">12&quot; &#215; 12&quot; mat · weed then transfer-tape</text>
    <text x="1080" y="82" class="lbl s" text-anchor="end">RED &amp; WHITE cut as separate layers</text>
  </g>

  <!-- COLOR KEY -->
  <g transform="translate(44,116)">
    <rect x="0" y="0" width="132" height="30" rx="6" fill="#20242b" stroke="#2a2e35"/><rect x="11" y="8" width="14" height="14" rx="3" fill="#dc2626"/><text x="34" y="20" class="lbl">RED VINYL</text>
    <rect x="146" y="0" width="146" height="30" rx="6" fill="#20242b" stroke="#2a2e35"/><rect x="157" y="8" width="14" height="14" rx="3" fill="#f5f6f7"/><text x="180" y="20" class="lbl">WHITE VINYL</text>
  </g>

  <!-- ===== TOW ARROWS ===== -->
  <g transform="translate(60,190)">
    <text x="0" y="0" class="lbl">TOW ARROWS &#215;4 <tspan class="lbl s">(+2 spare)</tspan></text>
    <g transform="translate(20,54) scale(2.4)"><path class="redv" d="M -20 -5 L 5 -5 L 5 -12 L 20 0 L 5 12 L 5 5 L -20 5 Z"/></g>
    <g transform="translate(20,120) scale(2.4)"><path class="redv" d="M -20 -5 L 5 -5 L 5 -12 L 20 0 L 5 12 L 5 5 L -20 5 Z"/></g>
    <line class="dim" x1="-28" y1="150" x2="72" y2="150"/><line class="dim" x1="-28" y1="144" x2="-28" y2="156"/><line class="dim" x1="72" y1="144" x2="72" y2="156"/>
    <text x="22" y="170" class="dimt" text-anchor="middle">6&quot;</text>
    <text x="0" y="192" class="lbl s">Tow-eye mark · front &amp; rear</text>
  </g>

  <!-- ===== BATTERY CUT-OFF ===== -->
  <g transform="translate(300,190)">
    <text x="0" y="0" class="lbl">BATTERY CUT-OFF &#9650; &#215;3</text>
    <g transform="translate(46,66) scale(2.2)"><path class="redv" stroke-width="1.4" d="M 0 -13 L 13 10 L -13 10 Z"/><path fill="#fff" d="M -1 -6 L -6 3 L 0 3 L -3 9 L 7 -1 L 1 -1 L 4 -6 Z"/></g>
    <g transform="translate(140,66) scale(2.2)"><path class="redv" stroke-width="1.4" d="M 0 -13 L 13 10 L -13 10 Z"/><path fill="#fff" d="M -1 -6 L -6 3 L 0 3 L -3 9 L 7 -1 L 1 -1 L 4 -6 Z"/></g>
    <line class="dim" x1="16" y1="120" x2="76" y2="120"/><line class="dim" x1="16" y1="114" x2="16" y2="126"/><line class="dim" x1="76" y1="114" x2="76" y2="126"/>
    <text x="46" y="140" class="dimt" text-anchor="middle">4&quot;</text>
    <text x="0" y="176" class="lbl s">Master-switch mark ·</text>
    <text x="0" y="194" class="lbl s">red on a black patch</text>
  </g>

  <!-- ===== FIRE + SAFETY MARKS ===== -->
  <g transform="translate(560,190)">
    <text x="0" y="0" class="lbl">MARSHAL / SAFETY &#215;1 ea</text>
    <!-- fire system E-in-circle -->
    <g transform="translate(44,64)"><circle r="30" class="redp"/><circle r="30" fill="none" stroke="#fff" stroke-width="2"/><text y="12" class="stencil" font-size="34" fill="#fff" text-anchor="middle">E</text></g>
    <text x="44" y="118" class="dimt" text-anchor="middle">fire system</text>
    <!-- kill switch OFF/ON arc -->
    <g transform="translate(150,64)"><circle r="30" fill="#1b1b1b" stroke="#fff" stroke-width="2"/><path d="M -14 8 A 20 20 0 1 1 14 8" fill="none" stroke="#dc2626" stroke-width="4"/><line x1="0" y1="-18" x2="0" y2="2" stroke="#dc2626" stroke-width="4"/></g>
    <text x="150" y="118" class="dimt" text-anchor="middle">cut-off knob</text>
    <text x="0" y="150" class="lbl s">Functional marks — the details that read as real.</text>
  </g>

  <!-- ===== STENCIL LABELS ===== -->
  <g transform="translate(60,430)">
    <text x="0" y="0" class="lbl">STENCIL LABELS &#215;1 ea <tspan class="lbl s">(white)</tspan></text>
    <g class="stencil white" font-size="30">
      <text x="0" y="46">FUEL</text>
      <text x="120" y="46">OIL</text>
      <text x="210" y="46">TOW</text>
      <text x="330" y="46">JACK</text>
    </g>
    <text x="0" y="78" class="lbl s">Small under-hood / jack-point call-outs · 1.5&quot; caps</text>
  </g>

  <!-- ===== ROCKER MICRO WORDMARK ===== -->
  <g transform="translate(560,430)">
    <text x="0" y="0" class="lbl">DOOR-LEDGE WORDMARK &#215;2 <tspan class="lbl s">(white)</tspan></text>
    <rect class="box" x="0" y="14" width="440" height="44"/>
    <text x="220" y="46" class="head white" font-size="26" text-anchor="middle" letter-spacing="10">SATURN&#160;SL</text>
    <line class="dim" x1="0" y1="72" x2="440" y2="72"/><line class="dim" x1="0" y1="66" x2="0" y2="78"/><line class="dim" x1="440" y1="66" x2="440" y2="78"/>
    <text x="220" y="90" class="dimt" text-anchor="middle">11&quot; · fits the Cricut · larger copy on Sheet 1</text>
  </g>

  <!-- ===== CONTINGENCY COLUMNS ===== -->
  <g transform="translate(60,560)">
    <text x="0" y="0" class="lbl">CONTINGENCY COLUMNS &#215;2</text>
    <!-- column 1 -->
    <g transform="translate(0,18)">
      <rect class="cont" x="0" y="0" width="200" height="290" rx="8"/>
      <g font-family="'SF Mono',monospace" fill="#8b93a0" font-size="12" text-anchor="middle">
        <rect x="16" y="16" width="168" height="42" rx="5" fill="#15181c" stroke="#3a3f47"/><text x="100" y="42">ASSOCIATE 01</text>
        <rect x="16" y="68" width="168" height="42" rx="5" fill="#15181c" stroke="#3a3f47"/><text x="100" y="94">ASSOCIATE 02</text>
        <rect x="16" y="120" width="168" height="42" rx="5" fill="#15181c" stroke="#3a3f47"/><text x="100" y="146">ASSOCIATE 03</text>
        <rect x="16" y="172" width="168" height="42" rx="5" fill="#15181c" stroke="#3a3f47"/><text x="100" y="198">ASSOCIATE 04</text>
        <rect x="16" y="224" width="168" height="42" rx="5" fill="#15181c" stroke="#3a3f47"/><text x="100" y="250">ASSOCIATE 05</text>
      </g>
    </g>
    <!-- column 2 -->
    <g transform="translate(224,18)">
      <rect class="cont" x="0" y="0" width="200" height="290" rx="8"/>
      <g font-family="'SF Mono',monospace" fill="#8b93a0" font-size="12" text-anchor="middle">
        <rect x="16" y="16" width="168" height="42" rx="5" fill="#15181c" stroke="#3a3f47"/><text x="100" y="42">ASSOCIATE 06</text>
        <rect x="16" y="68" width="168" height="42" rx="5" fill="#15181c" stroke="#3a3f47"/><text x="100" y="94">ASSOCIATE 07</text>
        <rect x="16" y="120" width="168" height="42" rx="5" fill="#15181c" stroke="#3a3f47"/><text x="100" y="146">ASSOCIATE 08</text>
        <rect x="16" y="172" width="168" height="42" rx="5" fill="#15181c" stroke="#3a3f47"/><text x="100" y="198">ASSOCIATE 09</text>
        <rect x="16" y="224" width="168" height="42" rx="5" fill="#15181c" stroke="#3a3f47"/><text x="100" y="250">ASSOCIATE 10</text>
      </g>
    </g>
    <text x="0" y="336" class="lbl s">Front fenders · swap for your own associates. The small marks that read as “race car” — keep them uniform &amp; aligned.</text>
  </g>

  <!-- ===== SPARE RED BANDS / STRIPS ===== -->
  <g transform="translate(560,560)">
    <text x="0" y="0" class="lbl">PINSTRIPE / EDGE STRIPS <tspan class="lbl s">(red — trim to length)</tspan></text>
    <g class="redp">
      <rect x="0" y="16" width="440" height="16"/>
      <rect x="0" y="42" width="440" height="10"/>
      <rect x="0" y="62" width="300" height="10"/>
    </g>
    <text x="0" y="98" class="lbl s">For keyline touch-ups &amp; sealing band ends. Not structural.</text>

    <text x="0" y="140" class="lbl">SPARES</text>
    <g transform="translate(30,182) scale(1.7)"><path class="redv" d="M -20 -5 L 5 -5 L 5 -12 L 20 0 L 5 12 L 5 5 L -20 5 Z"/></g>
    <g transform="translate(150,182) scale(1.7)"><path class="redv" stroke-width="1.4" d="M 0 -13 L 13 10 L -13 10 Z"/><path fill="#fff" d="M -1 -6 L -6 3 L 0 3 L -3 9 L 7 -1 L 1 -1 L 4 -6 Z"/></g>
    <g transform="translate(250,168)"><circle r="26" class="redp"/><circle r="26" fill="none" stroke="#fff" stroke-width="2"/><text y="10" class="stencil" font-size="28" fill="#fff" text-anchor="middle">E</text></g>
    <text x="0" y="230" class="lbl s">Always cut a spare of every small mark — they’re cheap and easy to lift.</text>
  </g>

  <text x="560" y="936" class="lbl s" text-anchor="middle">SATURN SL · RACE LIVERY · small marks on Cricut · numbers &amp; roundel on Sheet 1 (sign shop)</text>
</svg>
